# NOTE: GitHub blocks pushing files under .github/workflows/ without the
# 'workflow' OAuth scope. To enable CI, move this file to
# .github/workflows/ci.yml in your local clone and push.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -q
      - name: Smoke-test the demo
        run: python demo/run_demo.py
